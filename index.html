<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wordly Dictionary</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="📖" />
</head>

<body>

  <div class="container">

    <!-- HEADER -->
    <div class="logo">
      <span>📖</span>
      Wordly Dictionary
    </div>

    <!-- TITLE -->
    <h1>Learn English<br/>words instantly</h1>

    <p class="subtitle">Search over thousands of words with accurate definitions.</p>

    <!-- SEARCH -->
    <form id="searchForm">
      <div class="search-box">

        <!-- Accessibility label -->
        <label for="wordInput" class="visually-hidden">Search word</label>

        <input type="text"  id="wordInput" placeholder="Enter a word to search..."autocomplete="off"enterkeyhint="search"requiredautofocus/>

        <button type="submit">Search</button>
      </div>
    </form>

    <!-- RESULT -->
    <div id="result" class="result"></div>

    <!-- DECORATION -->
    <div class="books">
      <div class="book book1"></div>
      <div class="book book2"></div>
      <div class="book book3"></div>
      <div class="pencil"></div>
    </div>

  </div>

  <script src="index.js"></script>
</body>
</html>
